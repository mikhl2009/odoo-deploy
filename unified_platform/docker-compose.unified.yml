services:
  app_redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./api
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unified}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unified}
      POSTGRES_DB: ${POSTGRES_DB:-unified_erp}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-redis://app_redis:6379/0}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8080}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-change-me-refresh-key}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES:-10080}
      WGR_API_URL: ${WGR_API_URL:-}
      WGR_API_USER: ${WGR_API_USER:-}
      WGR_API_PASS: ${WGR_API_PASS:-}
      WGR_LOCATION_ID: ${WGR_LOCATION_ID:-1}
      WGR_COMPANY_ID: ${WGR_COMPANY_ID:-1}
      NSHIFT_API_URL: ${NSHIFT_API_URL:-https://api.unifaun.com/rs-extapi/v1}
      NSHIFT_DEVELOPER_ID: ${NSHIFT_DEVELOPER_ID:-}
      NSHIFT_API_KEY: ${NSHIFT_API_KEY:-}
      NSHIFT_PRINTER_ID: ${NSHIFT_PRINTER_ID:-}
      NSHIFT_SENDER_QUICK_ID: ${NSHIFT_SENDER_QUICK_ID:-SNUSHALLEN}
      WOO_PUSH_BATCH_SIZE: ${WOO_PUSH_BATCH_SIZE:-50}
    depends_on:
      app_redis:
        condition: service_healthy
    expose:
      - "8080"
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8080"]

  worker:
    build:
      context: ./api
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unified}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unified}
      POSTGRES_DB: ${POSTGRES_DB:-unified_erp}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-redis://app_redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-change-me-refresh-key}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES:-10080}
      WGR_API_URL: ${WGR_API_URL:-}
      WGR_API_USER: ${WGR_API_USER:-}
      WGR_API_PASS: ${WGR_API_PASS:-}
      WGR_LOCATION_ID: ${WGR_LOCATION_ID:-1}
      WGR_COMPANY_ID: ${WGR_COMPANY_ID:-1}
      NSHIFT_API_URL: ${NSHIFT_API_URL:-https://api.unifaun.com/rs-extapi/v1}
      NSHIFT_DEVELOPER_ID: ${NSHIFT_DEVELOPER_ID:-}
      NSHIFT_API_KEY: ${NSHIFT_API_KEY:-}
      NSHIFT_PRINTER_ID: ${NSHIFT_PRINTER_ID:-}
      NSHIFT_SENDER_QUICK_ID: ${NSHIFT_SENDER_QUICK_ID:-SNUSHALLEN}
      WOO_PUSH_BATCH_SIZE: ${WOO_PUSH_BATCH_SIZE:-50}
    depends_on:
      app_redis:
        condition: service_healthy
      api:
        condition: service_started
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=INFO", "-Q", "pim,wgr,woo,nshift,celery"]

  beat:
    build:
      context: ./api
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unified}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unified}
      POSTGRES_DB: ${POSTGRES_DB:-unified_erp}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-redis://app_redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-change-me-refresh-key}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES:-10080}
      WGR_API_URL: ${WGR_API_URL:-}
      WGR_API_USER: ${WGR_API_USER:-}
      WGR_API_PASS: ${WGR_API_PASS:-}
      WGR_LOCATION_ID: ${WGR_LOCATION_ID:-1}
      WGR_COMPANY_ID: ${WGR_COMPANY_ID:-1}
      NSHIFT_API_URL: ${NSHIFT_API_URL:-https://api.unifaun.com/rs-extapi/v1}
      NSHIFT_DEVELOPER_ID: ${NSHIFT_DEVELOPER_ID:-}
      NSHIFT_API_KEY: ${NSHIFT_API_KEY:-}
      NSHIFT_PRINTER_ID: ${NSHIFT_PRINTER_ID:-}
      NSHIFT_SENDER_QUICK_ID: ${NSHIFT_SENDER_QUICK_ID:-SNUSHALLEN}
      WOO_PUSH_BATCH_SIZE: ${WOO_PUSH_BATCH_SIZE:-50}
    depends_on:
      app_redis:
        condition: service_healthy
      api:
        condition: service_started
    command: ["celery", "-A", "app.worker.celery_app", "beat", "--loglevel=INFO"]

  web:
    build:
      context: ./web
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.snushallen.cloud}
    expose:
      - "3000"
